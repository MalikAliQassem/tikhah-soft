
<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عرض ملف PDF باستخدام PDF.js</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            direction: rtl;
        }
        #pdf-container {
            width: 100%;
            height: 90vh;
            overflow: auto;
            text-align: center;
            background-color: #ccc;
        }
        canvas {
            border: 1px solid #000;
            margin-bottom: 10px;
        }
        #controls {
            padding: 10px;
            background-color: #f0f0f0;
            text-align: center;
        }
        button {
            padding: 10px 20px;
            margin: 0 5px;
            font-size: 16px;
        }
        .error {
            color: red;
            text-align: center;
            padding: 20px;
            margin: 20px;
            background-color: #ffe6e6;
            border: 1px solid red;
            border-radius: 5px;
        }
         .loading {
            text-align: center;
            padding: 50px;
            font-size: 18px;
            color: #666;
        }
#loading {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #ffffff;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

.spinner {
  width: 50px;
  height: 50px;
  border: 5px solid #eee;
  border-top: 5px solid #007bff;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin-bottom: 10px;
}

@keyframes spin {
  to {
    transform: rotate(360deg);
  }
}
        .dots {
  display: flex;
  gap: 8px;
  margin-bottom: 10px;
}

.dots span {
  width: 12px;
  height: 12px;
  background: #007bff;
  border-radius: 50%;
  animation: bounce 0.6s infinite alternate;
}

.dots span:nth-child(2) {
  animation-delay: 0.2s;
}

.dots span:nth-child(3) {
  animation-delay: 0.4s;
}

@keyframes bounce {
  to {
    transform: translateY(-10px);
    opacity: 0.5;
  }
}
    </style>
</head>
<body>

    <div id="controls">
        <button id="prev">السابق</button>
        <span>صفحة: <span id="page_num">1</span> / <span id="page_count">---</span></span>
        <button id="next">التالي</button>
    </div>
    <div id="pdf-container">
            <div id="loading">
        <div class="dots">
        <span></span>
        <span></span>
        <span></span>
        </div>
        <p>جاري تحميل الملف...</p>
        </div>
        <canvas id="pdf-render"></canvas>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.7.107/pdf.min.js"></script>
    <script>
        // يمكنك تغيير هذا المسار إلى ملف PDF المحلي أو عبر الإنترنت
        const url = 'https://raw.githubusercontent.com/MalikAliQassem/tikhah-soft/main/whatsapp/whatsappHelp.pdf';
        
        // إعدادات PDF.js للعمل مع WebView في WinForms
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.7.107/pdf.worker.min.js';

        let pdfDoc = null,
            pageNum = 1,
            pageIsRendering = false,
            pageNumIsPending = null;

        const scale = 1.5,
              canvas = document.getElementById('pdf-render'),
              ctx = canvas.getContext('2d');

            
        function showLoading() {
            const loadingDiv = document.getElementById("loading");
            if (loadingDiv) loadingDiv.style.display ="flex";
}

    function hideLoading() {
        const loadingDiv = document.getElementById("loading");
    if (loadingDiv) loadingDiv.style.display ="none";
    }
        // تحميل ملف PDF
        pdfjsLib.getDocument(url).promise.then(pdfDoc_ => {
            pdfDoc = pdfDoc_;
            document.getElementById('page_count').textContent = pdfDoc.numPages;
            hideLoading();
            renderPage(pageNum);
        }).catch(err => {
             console.error('خطأ في تحميل PDF:', err);
            hideLoading();
            
            let errorMessage = `فشل تحميل ملف PDF: ${pdfFileName}<br><br>`;
            errorMessage += `السبب: ${err.message}<br><br>`;
            errorMessage += `المسار الذي تم محاولة التحميل منه:<br>${pdfUrl}<br><br>`;
            errorMessage += `<strong>الحلول المقترحة:</strong><br>`;
            errorMessage += `1. تأكد من وجود ملف ${pdfFileName} في نفس المجلد مع ملف HTML<br>`;
            errorMessage += `2. تأكد من صحة اسم الملف (الحروف الكبيرة والصغيرة مهمة)<br>`;
            errorMessage += `3. إذا كنت تستخدم GitHub، تأكد من رفع الملف إلى المستودع<br>`;
            errorMessage += `4. استخدم المسار المطلق لملف PDF عبر الرابط الخام (raw)`;
            
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error';
            errorDiv.innerHTML = errorMessage;
            document.getElementById('pdf-container').appendChild(errorDiv);
            document.getElementById('controls').style.display = 'none';
        
        });

        // عرض صفحة معينة
        const renderPage = num => {
            showLoading();
            pageIsRendering = true;

            pdfDoc.getPage(num).then(page => {
                const viewport = page.getViewport({ scale });
                canvas.height = viewport.height;
                canvas.width = viewport.width;

                const renderCtx = {
                    canvasContext: ctx,
                    viewport
                };

                page.render(renderCtx).promise.then(() => {
                    pageIsRendering = false;
                    if (pageNumIsPending !== null) {
                        renderPage(pageNumIsPending);
                        pageNumIsPending = null;
                    }
                }).catch(function (err) {
    console.error("حدث خطأ:", err);
  })
  .finally(function () {
      hideLoading();
  });
            }).catch(function (err) {
    console.error("حدث خطأ:", err);
  })
  .finally(function () {
      hideLoading();
  });

            document.getElementById('page_num').textContent = num;
        };

        const queueRenderPage = num => {
            if (pageIsRendering) {
                pageNumIsPending = num;
            } else {
                renderPage(num);
            }
        };

        const showNextPage = () => {
            if (pageNum >= pdfDoc.numPages) return;
            pageNum++;
            queueRenderPage(pageNum);
        };

        const showPrevPage = () => {
            if (pageNum <= 1) return;
            pageNum--;
            queueRenderPage(pageNum);
        };

        document.getElementById('next').addEventListener('click', showNextPage);
        document.getElementById('prev').addEventListener('click', showPrevPage);
        
        // دعم لوحة المفاتيح
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') showNextPage();
            if (e.key === 'ArrowLeft') showPrevPage();
        });
    </script>
</body>
</html>
