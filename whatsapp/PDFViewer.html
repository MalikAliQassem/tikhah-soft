<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عرض ملف PDF باستخدام PDF.js</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            direction: rtl;
        }
        #pdf-container {
            width: 100%;
            height: 90vh;
            overflow: auto;
            text-align: center;
            background-color: #ccc;
        }
        canvas {
            border: 1px solid #000;
            margin-bottom: 10px;
        }
        #controls {
            padding: 10px;
            background-color: #f0f0f0;
            text-align: center;
        }
        button {
            padding: 10px 20px;
            margin: 0 5px;
            font-size: 16px;
        }
        .error {
            color: red;
            text-align: center;
            padding: 20px;
            margin: 20px;
            background-color: #ffe6e6;
            border: 1px solid red;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <div id="controls">
        <button id="prev">السابق</button>
        <span>صفحة: <span id="page_num">1</span> / <span id="page_count">---</span></span>
        <button id="next">التالي</button>
    </div>
    <div id="pdf-container">
        <canvas id="pdf-render"></canvas>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.7.107/pdf.min.js"></script>
    <script>
        // يمكنك تغيير هذا المسار إلى ملف PDF المحلي أو عبر الإنترنت
        const url = 'https://github.com/MalikAliQassem/tikhah-soft/raw/main/whatsapp/whatsappHelp.pdf';
        
        // إعدادات PDF.js للعمل مع WebView في WinForms
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.7.107/pdf.worker.min.js';

        let pdfDoc = null,
            pageNum = 1,
            pageIsRendering = false,
            pageNumIsPending = null;

        const scale = 1.5,
              canvas = document.getElementById('pdf-render'),
              ctx = canvas.getContext('2d');

        // تحميل ملف PDF
        pdfjsLib.getDocument(url).promise.then(pdfDoc_ => {
            pdfDoc = pdfDoc_;
            document.getElementById('page_count').textContent = pdfDoc.numPages;
            renderPage(pageNum);
        }).catch(err => {
            console.error('خطأ في تحميل PDF:', err);
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error';
            errorDiv.innerHTML = `<strong>خطأ في تحميل الملف:</strong><br>${err.message}<br><br>
                                 <strong>نصيحة:</strong> تأكد من أن ملف PDF متاح على المسار المحدد.`;
            document.getElementById('pdf-container').appendChild(errorDiv);
            document.getElementById('controls').style.display = 'none';
        });

        // عرض صفحة معينة
        const renderPage = num => {
            pageIsRendering = true;

            pdfDoc.getPage(num).then(page => {
                const viewport = page.getViewport({ scale });
                canvas.height = viewport.height;
                canvas.width = viewport.width;

                const renderCtx = {
                    canvasContext: ctx,
                    viewport
                };

                page.render(renderCtx).promise.then(() => {
                    pageIsRendering = false;
                    if (pageNumIsPending !== null) {
                        renderPage(pageNumIsPending);
                        pageNumIsPending = null;
                    }
                });
            });

            document.getElementById('page_num').textContent = num;
        };

        const queueRenderPage = num => {
            if (pageIsRendering) {
                pageNumIsPending = num;
            } else {
                renderPage(num);
            }
        };

        const showNextPage = () => {
            if (pageNum >= pdfDoc.numPages) return;
            pageNum++;
            queueRenderPage(pageNum);
        };

        const showPrevPage = () => {
            if (pageNum <= 1) return;
            pageNum--;
            queueRenderPage(pageNum);
        };

        document.getElementById('next').addEventListener('click', showNextPage);
        document.getElementById('prev').addEventListener('click', showPrevPage);
        
        // دعم لوحة المفاتيح
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') showNextPage();
            if (e.key === 'ArrowLeft') showPrevPage();
        });
    </script>
</body>
</html>
